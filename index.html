<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Planner</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3a3128">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Planner">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #8c6d4f;
    --accent-dark: #6f5539;
    --ink: #3a3128;
    --bg: #f7f4ee;
    --card: #fffdf9;
    --text: #3a3128;
    --muted: #a1937f;
    --border: #eae3d7;
    --shadow: 0 1px 6px rgba(90, 70, 40, .06);
    --ink-contrast: #fdfaf5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Inter", "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: rgba(255, 253, 249, .9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 17px; font-weight: 700; color: var(--ink); letter-spacing: 1.5px; }
  nav { display: flex; gap: 2px; flex-wrap: wrap; }
  nav button {
    border: none;
    background: transparent;
    padding: 8px 13px;
    font-size: 13.5px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    border-radius: 99px;
    color: var(--muted);
    transition: all .15s;
    white-space: nowrap;
  }
  nav button.active { background: var(--ink); color: var(--ink-contrast); }
  nav button:hover:not(.active) { background: #efe9df; color: var(--text); }
  .chip-btn {
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 99px;
    padding: 6px 14px;
    font-size: 12.5px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    color: var(--muted);
    transition: all .15s;
  }
  .chip-btn:hover { border-color: var(--accent); color: var(--accent); }
  .chip-btn.on { border-color: var(--accent); color: var(--accent); background: #f4ede3; }

  main { max-width: 900px; margin: 0 auto; padding: 26px 20px; }
  .view { display: none; }
  .view.active { display: block; animation: fadein .18s; }
  @keyframes fadein { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
  h2 { font-size: 14px; font-weight: 700; margin-bottom: 14px; letter-spacing: .8px; color: var(--ink); }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 18px;
    box-shadow: var(--shadow);
  }
  input, textarea, select {
    font-family: inherit;
    font-size: 14px;
    padding: 9px 12px;
    border: 1px solid #ddd3c4;
    border-radius: 9px;
    background: #fff;
    color: var(--text);
  }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
  button.primary {
    background: var(--ink);
    color: var(--ink-contrast);
    border: none;
    padding: 9px 20px;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background .15s;
  }
  button.primary:hover { background: #574a3a; }
  button.small {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    color: #c5b8a5;
    padding: 4px;
  }
  button.small:hover { color: #b3543f; }
  button.small.edit { color: #a1937f; }
  button.small.edit:hover { color: var(--accent-dark); }
  button.ghost {
    background: transparent;
    border: 1px solid #ddd3c4;
    border-radius: 99px;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    color: var(--muted);
  }
  button.ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* Tasks */
  .task-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .task-form input[type="text"] { flex: 1; min-width: 150px; }
  .time-range { display: flex; align-items: center; gap: 4px; color: var(--muted); font-size: 13px; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 4px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
  .task-item.done .task-title { text-decoration: line-through; color: #c5b8a5; }
  .task-title { flex: 1; font-size: 14px; font-weight: 500; }
  .task-due { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .task-due.overdue { color: #b3543f; font-weight: 700; }
  .badge {
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 99px;
    white-space: nowrap;
    letter-spacing: .3px;
  }
  .badge.high { background: #f4e0da; color: #a34a36; }
  .badge.mid { background: #f2e8d5; color: #96702a; }
  .badge.low { background: #e6ecdf; color: #5f7a4e; }
  .tag-chip {
    font-size: 10.5px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 99px;
    background: #efe8db;
    color: #8c7b60;
    white-space: nowrap;
  }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-bar input { flex: 1; min-width: 140px; font-size: 13px; padding: 7px 11px; }
  .filter-bar select { font-size: 13px; padding: 7px 11px; }
  .notify-label { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap; }
  .notify-label input { accent-color: var(--accent); width: 15px; height: 15px; }
  .mute-mark { font-size: 12px; }
  .sub-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px 6px 36px;
    border-bottom: 1px dashed var(--border);
    font-size: 13px;
  }
  .sub-item input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .sub-item.done .sub-title { text-decoration: line-through; color: #c5b8a5; }
  .sub-title { flex: 1; }
  .sub-form { display: flex; gap: 6px; margin: 6px 0 8px 36px; }
  .sub-form input { flex: 1; font-size: 13px; padding: 6px 9px; }

  /* Stats */
  .chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding-top: 8px; }
  .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 4px; }
  .chart-bar { width: 70%; background: var(--accent); border-radius: 6px 6px 0 0; min-height: 2px; transition: height .3s; }
  .chart-num { font-size: 11px; font-weight: 700; color: var(--accent-dark); }
  .chart-label { font-size: 10px; color: var(--muted); font-weight: 600; }
  .mood-week { display: flex; gap: 8px; justify-content: space-between; }
  .mood-week-day { flex: 1; text-align: center; cursor: pointer; border-radius: 8px; padding: 4px 0; }
  .mood-week-day:hover { background: #f4ede3; }
  .mood-week-day .emo { font-size: 24px; }
  .mood-week-day .lbl { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 2px; }
  .stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .stat-row-num { font-size: 12px; font-weight: 700; color: var(--accent-dark); white-space: nowrap; }

  /* Pomodoro */
  .pomo-card { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .pomo-time { font-size: 38px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: 2px; }
  .pomo-mode { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); }
  .pomo-mode.break { color: #5f7a4e; }
  .pomo-btns { display: flex; gap: 8px; }
  .pomo-count { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* Calendar */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 6px; }
  .cal-header h2 { margin: 0; }
  .cal-header button {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 5px 14px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    color: var(--muted);
  }
  .cal-header button:hover { border-color: var(--accent); color: var(--accent); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-dow { text-align: center; font-size: 10.5px; font-weight: 700; color: var(--muted); padding: 4px 0; text-transform: uppercase; letter-spacing: 1px; }
  .cal-cell {
    min-height: 72px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 5px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color .12s;
    min-width: 0;
    overflow: hidden;
  }
  .cal-cell:hover { border-color: var(--accent); }
  .cal-cell.other { opacity: 0.35; }
  .cal-cell.today { border: 2px solid var(--accent); background: #fdfaf4; }
  .cal-cell .daynum { font-weight: 700; font-size: 12px; }
  .cal-task-dot { color: #96702a; font-size: 10.5px; margin-top: 2px; }
  .ev-dots { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 5px; }
  .ev-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .ev-dot.rec { opacity: .55; }
  .ev-dot.inline { display: inline-block; margin-right: 7px; vertical-align: middle; }
  .diary-cal-cell { min-height: 56px; text-align: center; }
  .diary-cal-cell .mood-big { font-size: 23px; margin-top: 2px; }
  .diary-cal-cell.has-entry { background: #fdfaf3; }
  .diary-cal-cell.selected { border: 2px solid var(--accent-dark); }
  .color-swatches { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .color-sw {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2.5px solid transparent;
    cursor: pointer;
    padding: 0;
  }
  .color-sw.sel { border-color: var(--ink); box-shadow: 0 0 0 2px #fff inset; }

  /* Progress */
  .proj-item { margin-bottom: 16px; }
  .proj-item.lv1 { margin-left: 26px; }
  .proj-item.lv2 { margin-left: 52px; }
  .proj-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .proj-name { flex: 1; font-size: 14px; font-weight: 700; }
  .proj-item.lv1 .proj-name, .proj-item.lv2 .proj-name { font-weight: 500; }
  .proj-pct { font-size: 12.5px; font-weight: 700; color: var(--accent); }
  .lv-tag {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 99px;
    background: #efe8db;
    color: #8c7b60;
    white-space: nowrap;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .bar-bg { background: #ece5d8; border-radius: 99px; height: 12px; overflow: hidden; }
  .proj-item.lv1 .bar-bg, .proj-item.lv2 .bar-bg { height: 9px; }
  .bar-fill { background: var(--accent); height: 100%; border-radius: 99px; transition: width .3s; }
  .proj-controls { display: flex; gap: 6px; margin-top: 5px; align-items: center; }
  .proj-controls input[type="range"] { flex: 1; accent-color: var(--accent); }
  .add-goal-btn {
    background: #f2ecdf;
    border: none;
    border-radius: 99px;
    padding: 3px 12px;
    font-size: 11.5px;
    font-weight: 700;
    font-family: inherit;
    color: var(--accent-dark);
    cursor: pointer;
  }
  .add-goal-btn:hover { background: #e9e0cd; }
  .child-form { display: flex; gap: 6px; margin-top: 8px; }
  .child-form input { flex: 1; font-size: 13px; padding: 7px 10px; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.5; }

  /* Diary */
  .diary-entry-view { padding: 14px 4px 4px; }
  .diary-date { font-size: 13px; font-weight: 700; color: #6f5a3a; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .diary-text { font-size: 14px; white-space: pre-wrap; line-height: 1.7; }
  .mood { font-size: 17px; margin-right: 6px; }
  .mood-picker { display: flex; gap: 3px; flex-wrap: wrap; }
  .mood-picker button {
    font-size: 21px;
    background: transparent;
    border: 2px solid transparent;
    border-radius: 9px;
    padding: 3px 5px;
    cursor: pointer;
    transition: all .12s;
    opacity: .4;
    filter: grayscale(.5);
  }
  .mood-picker button:hover { transform: scale(1.15); opacity: 1; filter: none; }
  .mood-picker button.sel {
    border-color: var(--accent);
    background: #f4ede3;
    opacity: 1;
    filter: none;
    transform: scale(1.22);
    box-shadow: 0 2px 8px rgba(140, 109, 79, .35);
  }

  /* Habits */
  .habit-item { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-bottom: 1px solid var(--border); flex-wrap: wrap; cursor: pointer; }
  .habit-item:last-child { border-bottom: none; }
  .habit-name { flex: 1; min-width: 120px; font-size: 14px; font-weight: 600; }
  .habit-days { display: flex; gap: 4px; }
  .habit-day {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1.5px solid #ddd3c4;
    background: #fff;
    cursor: pointer;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-family: inherit;
    padding: 0;
  }
  .habit-day.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .habit-day.today-ring { box-shadow: 0 0 0 2px rgba(140,109,79,.35); }
  .streak { font-size: 12.5px; font-weight: 700; color: var(--accent-dark); white-space: nowrap; }

  /* Dashboard */
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 640px) { .dash-grid { grid-template-columns: 1fr; } }
  .stat { font-size: 30px; font-weight: 700; color: var(--ink); }
  .stat-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 2px; }
  .event-date-head { font-size: 11px; font-weight: 700; color: var(--accent-dark); margin-top: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .tappable .task-item { cursor: pointer; }
  .tappable .task-item:hover { background: #faf6ef; }

  .empty { color: #c5b8a5; font-size: 13px; padding: 14px 0; text-align: center; }

  /* Settings */
  .settings-card { background: transparent; border: none; box-shadow: none; padding: 6px 4px; }
  .settings-row { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .settings-label { font-size: 11px; color: #c5b8a5; letter-spacing: 1px; text-transform: uppercase; margin-right: 4px; }
  .sync-panel { width: 100%; max-width: 520px; margin-top: 8px; }
  .sync-panel textarea { width: 100%; font-size: 12px; font-family: monospace; }
  .sync-mail { font-size: 12.5px; color: var(--muted); }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(58, 49, 40, .4);
    backdrop-filter: blur(2px);
    z-index: 50;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 14px;
    padding: 22px;
    width: 90%;
    max-width: 430px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 16px 50px rgba(40, 30, 15, .3);
  }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .modal .row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
  .modal .row input[type="text"] { flex: 1; }
  .modal-events { margin-bottom: 12px; }
  .modal-event-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 14px; cursor: pointer; }
  .modal-close { text-align: right; margin-top: 10px; }
  .repeat-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); cursor: pointer; }
  .repeat-label input { accent-color: var(--accent); width: 15px; height: 15px; }

  /* Undo toast */
  #toast {
    display: none;
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--ink-contrast);
    padding: 11px 18px;
    border-radius: 11px;
    font-size: 14px;
    z-index: 100;
    align-items: center;
    gap: 14px;
    box-shadow: 0 8px 24px rgba(40, 30, 15, .35);
  }
  #toast.show { display: flex; }
  #toast button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }

  /* Dark theme */
  html.dark {
    --accent: #a98a66;
    --accent-dark: #c7a97f;
    --ink: #e9e3d8;
    --bg: #1c1915;
    --card: #262119;
    --text: #e9e3d8;
    --muted: #948a77;
    --border: #383228;
    --shadow: 0 1px 6px rgba(0, 0, 0, .3);
    --ink-contrast: #262119;
  }
  html.dark body { background: var(--bg); }
  html.dark header { background: rgba(28, 25, 21, .9); }
  html.dark input, html.dark textarea, html.dark select { background: #1f1b15; border-color: #453e31; color: var(--text); }
  html.dark button.primary:hover { background: #d8cfbe; }
  html.dark button.ghost { border-color: #453e31; }
  html.dark nav button:hover:not(.active) { background: #332d24; color: var(--text); }
  html.dark .chip-btn.on { background: #332b1f; }
  html.dark .cal-cell { background: #221d17; }
  html.dark .cal-cell.today { background: #2a241b; }
  html.dark .diary-cal-cell.has-entry { background: #282218; }
  html.dark .mood-picker button.sel { background: #332b1f; }
  html.dark .mood-week-day:hover { background: #2a251d; }
  html.dark .add-goal-btn { background: #332b1f; color: #c7a97f; }
  html.dark .add-goal-btn:hover { background: #3d3426; }
  html.dark .bar-bg { background: #383228; }
  html.dark .habit-day { background: #221d17; border-color: #453e31; }
  html.dark .tag-chip, html.dark .lv-tag { background: #332d24; color: #b3a68d; }
  html.dark .tappable .task-item:hover { background: #2a251d; }
  html.dark .task-item.done .task-title { color: #6b6252; }
  html.dark .sub-item.done .sub-title { color: #6b6252; }
  html.dark .empty { color: #6b6252; }
  html.dark button.small { color: #6b6252; }
  html.dark button.small.edit { color: #948a77; }
  html.dark .diary-date { color: #c7a97f; }
  html.dark .badge.high { background: #4a2b24; color: #e8a394; }
  html.dark .badge.mid { background: #453620; color: #dbb26a; }
  html.dark .badge.low { background: #2c3a26; color: #a3c78f; }
  html.dark .color-sw.sel { border-color: var(--text); }

  /* Mobile */
  @media (max-width: 640px) {
    main { padding: 16px 10px; }
    .card { padding: 14px; border-radius: 12px; }
    .cal-grid { gap: 3px; }
    .cal-cell { min-height: 48px; padding: 4px; border-radius: 7px; }
    .diary-cal-cell { min-height: 50px; }
    .diary-cal-cell .mood-big { font-size: 17px; }
    nav { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; max-width: 100%; }
    nav button { padding: 7px 11px; font-size: 12.5px; }
    header { padding: 10px 12px; }
  }
</style>
</head>
<body>

<header>
  <h1 onclick="showView('dash')" style="cursor:pointer;">MY PLANNER</h1>
  <nav>
    <button data-view="dash" class="active" data-i18n="nav_home"></button>
    <button data-view="tasks" data-i18n="nav_tasks"></button>
    <button data-view="cal" data-i18n="nav_cal"></button>
    <button data-view="habits" data-i18n="nav_habits"></button>

<main>

  <!-- Dashboard -->
  <section id="view-dash" class="view active">

        <div class="stat-label" data-i18n="stat_today"></div>
      </div>
      <div class="card" onclick="showView('tasks')" style="cursor:pointer;">
        <div class="stat" id="dash-open-count">0</div>
        <div class="stat-label" data-i18n="stat_open"></div>
      </div>
    </div>
    <div class="card">
      <h2 data-i18n="week_events"></h2>
      <div id="dash-events" class="tappable"></div>

        <button class="ghost" id="btn-later" onclick="toggleLater()"></button>
      </div>
      <div id="dash-events-later" class="tappable" style="display:none;"></div>
    </div>
    <div class="card" onclick="dashCardTap(event)" style="cursor:pointer;">

      <div class="settings-row">
        <span class="settings-label" data-i18n="settings"></span>
        <button class="chip-btn" id="btn-notif" onclick="toggleNotif()"></button>
        <button class="chip-btn" onclick="toggleLang()" id="btn-lang"></button>
        <button class="chip-btn" onclick="exportData()" data-i18n="export"></button>
        <button class="chip-btn" onclick="document.getElementById('import-file').click()" data-i18n="import"></button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
      </div>
      <div class="settings-row" style="margin-top:8px;">
        <button class="chip-btn" onclick="exportICS()" data-i18n="ics_export"></button>
        <button class="chip-btn" onclick="document.getElementById('ics-file').click()" data-i18n="ics_import"></button>
        <input type="file" id="ics-file" accept=".ics" style="display:none" onchange="importICS(this)">
      </div>
      <div class="settings-row" id="notif-offsets" style="margin-top:10px;"></div>
      <div class="settings-row" id="sound-chips" style="margin-top:8px;"></div>
      <div class="settings-row" id="theme-chips" style="margin-top:8px;"></div>
      <div class="settings-row" id="sync-area" style="margin-top:8px;"></div>
    </div>
  </section>

  <!-- Tasks -->
  <section id="view-tasks" class="view">
    <div class="card">
      <h2 data-i18n="add_task"></h2>
      <div class="task-form">
        <input type="text" id="task-title" data-i18n-ph="task_name_ph" onkeydown="if(event.key==='Enter')addTask()">
        <input type="text" id="task-tag" data-i18n-ph="tag_ph" style="flex:0 1 110px; min-width:90px;">
        <input type="date" id="task-due">
        <span class="time-range">
          <input type="time" id="task-time">
          <span>–</span>
          <input type="time" id="task-time-end">
        </span>
        <select id="task-pri">
          <option value="mid" data-i18n="priority_mid"></option>
          <option value="high" data-i18n="priority_high"></option>
          <option value="low" data-i18n="priority_low"></option>
        </select>
        <label class="notify-label"><input type="checkbox" id="task-notify" checked><span data-i18n="notify_this"></span></label>
        <input type="time" id="task-notify-at" style="font-size:12px; padding:5px 7px;">
        <button class="primary" id="btn-task-add" onclick="addTask()"></button>
        <button class="ghost" id="btn-task-cancel" onclick="cancelTaskEdit()" style="display:none;"></button>
      </div>
      <p class="hint" data-i18n="notify_at_hint"></p>
    </div>
    <div class="card">
      <h2 data-i18n="open_tasks"></h2>
      <div class="filter-bar">
        <input type="text" id="task-search" data-i18n-ph="search_ph" oninput="renderTasks()">
        <select id="task-tag-filter" onchange="renderTasks()"></select>
      </div>
      <div id="task-list-open"></div>
    </div>
    <div class="card">
      <h2 data-i18n="done_tasks"></h2>
      <div id="task-list-done"></div>
    </div>
    <div class="card">
      <h2 data-i18n="add_goal"></h2>
      <div class="task-form">
        <input type="text" id="proj-name" data-i18n-ph="goal_ph" onkeydown="if(event.key==='Enter')addProj()">
        <button class="primary" onclick="addProj()" data-i18n="add"></button>
      </div>
      <p class="hint" data-i18n="goal_hint"></p>
    </div>
    <div class="card">
      <h2 data-i18n="goals"></h2>
      <div id="proj-list"></div>
    </div>
  </section>

  <!-- Calendar -->
  <section id="view-cal" class="view">
    <div class="card">
      <div class="cal-header">
        <button onclick="calMove(-1)">←</button>
        <h2 id="cal-title"></h2>
        <span style="display:flex; gap:6px;">
          <button onclick="calToday()" data-i18n="today_word"></button>
          <button onclick="calMove(1)">→</button>
        </span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </section>

  <!-- Habits -->
  <section id="view-habits" class="view">
    <div class="card pomo-card">
      <div>
        <div class="pomo-mode" id="pomo-mode"></div>
        <div class="pomo-time" id="pomo-time">25:00</div>

        <button class="primary" id="pomo-toggle" onclick="pomoToggle()"></button>

</main>

  save(key, val) {

  saveRaw(key, val) { localStorage.setItem('planner_' + key, JSON.stringify(val)); }

const DATA_KEYS = ['tasks','events','recurring','projects','diary','habits'];

// ---------- ICS export / import ----------
const ICS_DAYS = ['SU','MO','TU','WE','TH','FR','SA'];
const icsDate = ds => ds.replace(/-/g, '');
const icsEsc = s => s.replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,');
function exportICS() {
  const L = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//My Planner//JA'];
  const dt = (label, ds, tm) => tm ? `${label}:${icsDate(ds)}T${tm.replace(':','')}00` : `${label};VALUE=DATE:${icsDate(ds)}`;
  events.forEach(e => {
    L.push('BEGIN:VEVENT', 'UID:' + e.id + '@myplanner', 'SUMMARY:' + icsEsc(e.title), dt('DTSTART', e.date, e.time));
    if (e.time) L.push(dt('DTEND', e.date, e.timeEnd || e.time));
    L.push('END:VEVENT');
  });
  recurring.forEach(r => {
    L.push('BEGIN:VEVENT', 'UID:' + r.id + '@myplanner', 'SUMMARY:' + icsEsc(r.title), dt('DTSTART', r.from, r.time));
    if (r.time) L.push(dt('DTEND', r.from, r.timeEnd || r.time));
    L.push('RRULE:FREQ=WEEKLY;BYDAY=' + ICS_DAYS[r.dow], 'END:VEVENT');
  });
  L.push('END:VCALENDAR');
  const blob = new Blob([L.join('\r\n')], { type: 'text/calendar' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'planner-events.ics';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importICS(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const text = reader.result.replace(/\r?\n[ \t]/g, '');
      const blocks = text.split('BEGIN:VEVENT').slice(1);
      let count = 0;
      blocks.forEach(b => {
        b = b.split('END:VEVENT')[0];
        const get = re => { const m = b.match(re); return m ? m[1] : ''; };
        const summary = get(/SUMMARY[^:\n]*:(.+)/).replace(/\\,/g, ',').replace(/\\;/g, ';').replace(/\\\\/g, '\\').trim();
        const dtm = b.match(/DTSTART[^:\n]*:(\d{8})(?:T(\d{4}))?\d*(Z?)/);
        if (!summary || !dtm) return;
        let ds = dtm[1].slice(0,4) + '-' + dtm[1].slice(4,6) + '-' + dtm[1].slice(6,8);
        let tm = dtm[2] ? dtm[2].slice(0,2) + ':' + dtm[2].slice(2,4) : '';
        if (dtm[3] === 'Z' && tm) {
          const d = new Date(Date.UTC(+dtm[1].slice(0,4), +dtm[1].slice(4,6)-1, +dtm[1].slice(6,8), +tm.slice(0,2), +tm.slice(3,5)));
          ds = dateToStr(d);
          tm = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
        }
        const dte = b.match(/DTEND[^:\n]*:(\d{8})(?:T(\d{4}))?/);
        const tmEnd = (dte && dte[2] && dte[1] === dtm[1] && !dtm[3]) ? dte[2].slice(0,2) + ':' + dte[2].slice(2,4) : '';
        const rrule = get(/RRULE:(.+)/);
        if (/FREQ=WEEKLY/.test(rrule)) {
          recurring.push({ id: uid(), dow: strToDate(ds).getDay(), time: tm, timeEnd: tmEnd, title: summary, color: EV_COLORS[0], notify: true, notifyAt: '', from: ds });
        } else {
          events.push({ id: uid(), date: ds, time: tm, timeEnd: tmEnd, title: summary, color: EV_COLORS[0], notify: true, notifyAt: '' });
        }
        count++;
      });
      store.save('events', events);
      store.save('recurring', recurring);
      showToastPlain(t('ics_done')(count));
      renderAll();
    } catch {
      showToastPlain(t('ics_err'));
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function submitSub(id) {

function toggleSub(taskId, subId) {

  s.done = !s.done;

function delSub(taskId, subId) {

  if (s && !confirm(t('confirm_del')(s.title))) return;

// ---------- Pomodoro (timestamp-based; catches up after the screen was closed) ----------
let pomoCfg = store.load('pomoCfg', { work: 25, brk: 5 });
let pomoMode = 'work', pomoLeft = pomoCfg.work * 60, pomoEndAt = null, pomoInterval = null;
let pomoStat = store.load('pomo', { date: todayStr(), count: 0 });
if (pomoStat.date !== todayStr()) pomoStat = { date: todayStr(), count: 0 };

function pomoSave() {
  store.saveRaw('pomoRun', { running: !!pomoInterval, mode: pomoMode, endAt: pomoEndAt, left: pomoLeft });
}
function setPomoCfg() {
  const w = Math.min(180, Math.max(1, +document.getElementById('pomo-work-min').value || 25));
  const b = Math.min(60, Math.max(1, +document.getElementById('pomo-break-min').value || 5));
  pomoCfg = { work: w, brk: b };
  store.saveRaw('pomoCfg', pomoCfg);
  document.getElementById('pomo-work-min').value = w;
  document.getElementById('pomo-break-min').value = b;
  if (!pomoInterval) { pomoMode = 'work'; pomoLeft = w * 60; pomoEndAt = null; pomoSave(); updatePomoUI(); }
}
function pomoToggle() {
  ensureAudio();
  if (pomoInterval) {
    clearInterval(pomoInterval);
    pomoInterval = null;
    pomoEndAt = null;
  } else {
    pomoEndAt = Date.now() + pomoLeft * 1000;
    pomoInterval = setInterval(pomoTick, 500);
  }
  pomoSave();
  updatePomoUI();
}
function pomoReset() {
  clearInterval(pomoInterval);
  pomoInterval = null;
  pomoEndAt = null;
  pomoMode = 'work';
  pomoLeft = pomoCfg.work * 60;
  pomoSave();
  updatePomoUI();
}
function pomoAdvance() {
  if (pomoMode === 'work') {
    pomoStat = { date: todayStr(), count: (pomoStat.date === todayStr() ? pomoStat.count : 0) + 1 };
    store.saveRaw('pomo', pomoStat);
    const hist = store.load('pomoHist', {});
    hist[todayStr()] = (hist[todayStr()] || 0) + 1;
    store.saveRaw('pomoHist', hist);
    pomoMode = 'break';
    pomoLeft = pomoCfg.brk * 60;
  } else {
    pomoMode = 'work';
    pomoLeft = pomoCfg.work * 60;
  }
}
function pomoCatchUp(silent) {
  if (!pomoEndAt) return;
  let advanced = false, guard = 0;
  while (pomoEndAt - Date.now() <= 0 && guard++ < 500) {
    pomoAdvance();
    pomoEndAt += pomoLeft * 1000;
    advanced = true;
  }
  pomoLeft = Math.max(0, Math.round((pomoEndAt - Date.now()) / 1000));
  if (advanced) {
    if (!silent) {
      beep();
      if ('Notification' in window && Notification.permission === 'granted')
        new Notification('🍅 ' + (pomoMode === 'work' ? t('focus') : t('brk')) + '!');
    }
    pomoSave();
  }
}
function pomoTick() {
  pomoCatchUp(false);
  updatePomoUI();
}
function pomoRestore() {
  const r = store.load('pomoRun', null);
  if (!r) return;
  pomoMode = r.mode || 'work';
  if (r.running && r.endAt) {
    pomoEndAt = r.endAt;
    pomoLeft = Math.max(0, Math.round((pomoEndAt - Date.now()) / 1000));
    pomoInterval = setInterval(pomoTick, 500);
    pomoCatchUp(true);
  } else if (typeof r.left === 'number' && r.left > 0) {
    pomoLeft = r.left;
  }
}
function updatePomoUI() {
  const mm = String(Math.floor(pomoLeft / 60)).padStart(2, '0');
  const ss = String(pomoLeft % 60).padStart(2, '0');
  document.getElementById('pomo-time').textContent = mm + ':' + ss;
  const modeEl = document.getElementById('pomo-mode');
  modeEl.textContent = pomoMode === 'work' ? t('focus') : t('brk');
  modeEl.className = 'pomo-mode' + (pomoMode === 'break' ? ' break' : '');
  document.getElementById('pomo-toggle').textContent = pomoInterval ? t('pause') : t('start');
  document.getElementById('pomo-count').textContent = t('pomo_count')(pomoStat.date === todayStr() ? pomoStat.count : 0);
  document.title = pomoInterval ? `${mm}:${ss} ${pomoMode === 'work' ? '🍅' : '☕'} My Planner` : 'My Planner';
}
document.addEventListener('visibilitychange', () => { if (!document.hidden && pomoInterval) pomoTick(); });

// ---------- Sounds ----------
let soundType = localStorage.getItem('planner_sound') || 'chime';
let audioCtx = null;
function ensureAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch {}
  return audioCtx;
}
document.addEventListener('pointerdown', ensureAudio, { once: true });
function tone(ctx, freq, startAt, dur, vol) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, ctx.currentTime + startAt);
  gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + startAt + dur);
  osc.start(ctx.currentTime + startAt);
  osc.stop(ctx.currentTime + startAt + dur);
}
function beep() {
  if (soundType === 'none') return;
  const ctx = ensureAudio();
  if (!ctx || ctx.state !== 'running') return;
  try {
    if (soundType === 'beep') {

// ---------- Cloud Sync (Firebase) ----------
let fbConfig = store.load('fbconfig', null);
let fbUser = null, syncTimer = null, fbUnsub = null, lastPushed = 0, syncSetupOpen = false, syncStatus = '';
let lastLocalMod = +localStorage.getItem('planner_lastmod') || 0;

function markModified() {
  lastLocalMod = Date.now();
  localStorage.setItem('planner_lastmod', lastLocalMod);
  scheduleSync();
}
function statusText() {
  if (syncStatus === 'ok') return '☁ ' + t('sync_ok');
  if (syncStatus === 'pending') return '☁ …';
  if (syncStatus === 'error') return '⚠ ' + t('sync_err');
  return '';
}
function setSyncStatus(s) {
  syncStatus = s;
  const el = document.getElementById('sync-status');
  if (el) el.textContent = statusText();
}
function renderSyncUI() {
  const el = document.getElementById('sync-area');
  if (!el) return;
  if (typeof firebase === 'undefined') { el.innerHTML = ''; return; }
  let html = `<span class="settings-label">${t('sync_label')}</span>`;
  if (!fbConfig) {
    html += `<button class="chip-btn ${syncSetupOpen ? 'on' : ''}" onclick="toggleSyncSetup()">${t('sync_setup')}</button>`;
    if (syncSetupOpen) {
      html += `<div class="sync-panel">
        <textarea id="fb-config-input" rows="5" placeholder="${t('sync_ph')}"></textarea>
        <div style="text-align:right; margin-top:6px;">
          <button class="primary" onclick="saveFbConfig()">${t('sync_save')}</button>
        </div>
      </div>`;
    }
  } else if (!fbUser) {
    html += `<button class="chip-btn on" onclick="fbLogin()">${t('sync_login')}</button>
      <button class="chip-btn" onclick="removeFbConfig()">${t('sync_remove')}</button>`;
  } else {
    html += `<span class="sync-mail">${esc(fbUser.email || '')}</span>
      <span class="settings-label" id="sync-status">${statusText()}</span>
      <button class="chip-btn" onclick="fbLogout()">${t('sync_logout')}</button>`;
  }
  el.innerHTML = html;
}
function toggleSyncSetup() {
  syncSetupOpen = !syncSetupOpen;
  renderSyncUI();
  if (syncSetupOpen) document.getElementById('fb-config-input').focus();
}
function saveFbConfig() {
  const txt = document.getElementById('fb-config-input').value;
  const m = txt.match(/\{[\s\S]*\}/);
  let cfg = null;
  if (m) {
    try { cfg = JSON.parse(m[0]); } catch {
      try { cfg = (new Function('return ' + m[0]))(); } catch {}
    }
  }
  if (!cfg || !cfg.apiKey || !cfg.projectId) { showToastPlain(t('sync_bad')); return; }
  store.saveRaw('fbconfig', cfg);
  location.reload();
}
function removeFbConfig() {
  localStorage.removeItem('planner_fbconfig');
  location.reload();
}
function initFirebase() {
  if (!fbConfig || typeof firebase === 'undefined') return;
  try {
    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    firebase.auth().onAuthStateChanged(u => {
      fbUser = u;
      renderSyncUI();
      if (u) startSync();
      else if (fbUnsub) { fbUnsub(); fbUnsub = null; }
    });
  } catch (e) { console.error(e); }
}
function fbLogin() {
  if (typeof firebase === 'undefined' || !fbConfig) return;
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider).catch(() => firebase.auth().signInWithRedirect(provider));
}
function fbLogout() {
  firebase.auth().signOut();
}
function docRef() {
  return firebase.firestore().collection('planners').doc(fbUser.uid);
}
function startSync() {
  docRef().get().then(snap => {
    const remote = snap.exists ? snap.data() : null;
    if (remote && remote.updated > lastLocalMod) applyRemote(remote);
    else pushNow();
    if (fbUnsub) fbUnsub();
    fbUnsub = docRef().onSnapshot(s => {
      const r = s.exists ? s.data() : null;
      if (r && r.updated > lastLocalMod && r.updated !== lastPushed) applyRemote(r);
    });
  }).catch(() => setSyncStatus('error'));
}
function applyRemote(remote) {
  DATA_KEYS.forEach(k => { if (remote.data && Array.isArray(remote.data[k])) store.saveRaw(k, remote.data[k]); });
  lastLocalMod = remote.updated;
  localStorage.setItem('planner_lastmod', lastLocalMod);
  reloadData();
  renderAll();
  setSyncStatus('ok');
}
function scheduleSync() {
  if (!fbUser) return;
  setSyncStatus('pending');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushNow, 1500);
}
function pushNow() {
  if (!fbUser) return;
  const data = {};
  DATA_KEYS.forEach(k => data[k] = store.load(k, []));
  lastPushed = lastLocalMod || Date.now();
  docRef().set({ data, updated: lastPushed })
    .then(() => setSyncStatus('ok'))
    .catch(() => setSyncStatus('error'));
}

function renderDiary() {
  document.getElementById('dcal-title').textContent = t('calTitle')(dCalYear, dCalMonth);
  const today = todayStr();
  document.getElementById('dcal-grid').innerHTML = calGridHTML(dCalYear, dCalMonth, (d, ds, other) => {
    const entry = diary.find(e => e.date === ds);
    return `<div class="cal-cell diary-cal-cell ${other ? 'other' : ''} ${ds === today ? 'today' : ''} ${entry ? 'has-entry' : ''} ${ds === selectedDiaryDate ? 'selected' : ''}" onclick="selectDiaryDay('${ds}')">
      <span class="daynum">${d.getDate()}</span>
      ${entry ? `<div class="mood-big">${entry.mood}</div>` : ''}
    </div>`;
  });

  const sel = selectedDiaryDate ? diary.find(d => d.date === selectedDiaryDate) : null;
  document.getElementById('diary-selected').innerHTML = sel ? `
    <div class="diary-entry-view">
      <div class="diary-date">
        <span><span class="mood">${sel.mood}</span>${fmtDateFull(sel.date)}</span>
        <span>
          <button class="small edit" onclick="editDiary('${sel.date}')">${t('edit')}</button>
          <button class="small" onclick="delDiary('${sel.date}')">✕</button>
        </span>
      </div>
      <div class="diary-text">${esc(sel.text)}</div>
    </div>` : (selectedDiaryDate ? `<div class="empty">${t('no_entry')(fmtDateFull(selectedDiaryDate))}</div>` : '');
}

// ---------- Stats ----------
let statsHabitRange = 7, statsHabitOffset = 0;
function setStatsHabitRange(n) {
  statsHabitRange = n;
  statsHabitOffset = 0;
  renderStats();
}
function stHabitMove(d) {
  statsHabitOffset = Math.max(0, statsHabitOffset + d);
  renderStats();
}
function barsHTML(days, counts) {
  const max = Math.max(...counts, 1);
  return days.map((ds, i) => {
    const dt = strToDate(ds);
    return `<div class="chart-col">
      <span class="chart-num">${counts[i] || ''}</span>
      <div class="chart-bar" style="height:${(counts[i] / max) * 100}%"></div>
      <span class="chart-label">${t('dows')[dt.getDay()]}</span>
    </div>`;
  }).join('');
}
function renderStats() {
  const el = document.getElementById('st-done');
  if (!el) return;
  const days = lastNDays(7);

  const doneCounts = days.map(ds => tasks.filter(tk => tk.done && tk.doneAt && dateToStr(new Date(tk.doneAt)) === ds).length);
  el.innerHTML = barsHTML(days, doneCounts);

  const hist = store.load('pomoHist', {});
  const pomoCounts = days.map(ds => hist[ds] || 0);
  document.getElementById('st-pomo').innerHTML = barsHTML(days, pomoCounts);
  document.getElementById('st-pomo-total').textContent = pomoCounts.reduce((a, b) => a + b, 0);

  const weekTasks = tasks.filter(tk => tk.due && days.includes(tk.due));
  document.getElementById('st-rate').textContent = weekTasks.length
    ? Math.round(weekTasks.filter(tk => tk.done).length / weekTasks.length * 100) + '%'
    : '–';

  const open = tasks.filter(tk => !tk.done);
  const total = Math.max(open.length, 1);
  document.getElementById('st-pri').innerHTML = ['high','mid','low'].map(p => {
    const n = open.filter(tk => tk.pri === p).length;
    return `<div class="stat-row">
      <span class="badge ${p}" style="flex:0 0 52px; text-align:center;">${t('pri_' + p)}</span>
      <div class="bar-bg" style="flex:1; height:10px;"><div class="bar-fill" style="width:${(n / total) * 100}%"></div></div>
      <span class="stat-row-num">${n}</span>
    </div>`;
  }).join('');

  document.getElementById('st-mood').innerHTML = days.map(ds => {
    const entry = diary.find(d => d.date === ds);
    const dt = strToDate(ds);
    return `<div class="mood-week-day" onclick="goDiary('${ds}')"><div class="emo">${entry ? entry.mood : '·'}</div><div class="lbl">${t('dows')[dt.getDay()]}</div></div>`;
  }).join('');

  document.getElementById('st-habit-range').innerHTML =
    `<button class="chip-btn" onclick="stHabitMove(1)">←</button>
     <button class="chip-btn" onclick="stHabitMove(-1)">→</button>` +
    [7, 30].map(n =>
      `<button class="chip-btn ${statsHabitRange === n ? 'on' : ''}" onclick="setStatsHabitRange(${n})">${t(n === 7 ? 'range_week' : 'range_month')}</button>`).join('');
  const hdays = lastNDaysFrom(statsHabitRange, statsHabitOffset * statsHabitRange);
  const hlabel = document.getElementById('st-habit-label');
  if (hlabel) hlabel.textContent = `${fmtDate(hdays[0])} – ${fmtDate(hdays[hdays.length - 1])}`;
  document.getElementById('st-habits').innerHTML = habits.length ? habits.map(h => {
    const n = hdays.filter(ds => h.dates.includes(ds)).length;
    return `<div class="stat-row">
      <span style="flex:1; font-size:13px; font-weight:600;">${esc(h.name)}</span>
      <div class="bar-bg" style="flex:2; height:9px;"><div class="bar-fill" style="width:${(n / statsHabitRange) * 100}%"></div></div>
      <span class="stat-row-num">${n}/${statsHabitRange}</span>
    </div>`;
  }).join('') : `<div class="empty">${t('empty_habits')}</div>`;
}

// ---------- Dashboard ----------
let showLater = false;
function toggleLater() {
  showLater = !showLater;
  document.getElementById('dash-events-later').style.display = showLater ? 'block' : 'none';
  document.getElementById('btn-later').textContent = showLater ? t('hide_later') : t('show_later');
}
function eventItemHTML(e) {
  return `<div class="task-item" onclick="goEvent('${e.date}')"><span class="ev-dot inline" style="background:${e.color || EV_COLORS[0]}"></span><span class="task-title">${e.rec ? '🔁 ' : ''}${timeStr(e) ? '🕐 ' + timeStr(e) + ' ' : ''}${esc(e.title)}</span></div>`;
}
function renderDash() {
  const today = todayStr();
  const week = new Date();
  week.setDate(week.getDate() + 7);
  const weekStr = dateToStr(week);

  const open = tasks.filter(t => !t.done);
  document.getElementById('dash-today-count').textContent = open.filter(t => t.due === today).length;
  document.getElementById('dash-open-count').textContent = open.length;

  let weekHTML = '';
  const d = new Date();
  for (let i = 0; i <= 7; i++) {
    const ds = dateToStr(d);
    const dayEvents = eventsOn(ds).sort((a,b) => (a.time||'') < (b.time||'') ? -1 : 1);
    if (dayEvents.length) {
      weekHTML += `<div class="event-date-head">${ds === today ? t('today_word') + ' · ' : ''}${fmtDate(ds)}</div>`;
      weekHTML += dayEvents.map(eventItemHTML).join('');
    }
    d.setDate(d.getDate() + 1);
  }
  document.getElementById('dash-events').innerHTML = weekHTML || `<div class="empty">${t('empty_events_week')}</div>`;

  const laterEvents = events.filter(e => e.date > weekStr);
  const byDate = {};
  laterEvents.forEach(e => { (byDate[e.date] = byDate[e.date] || []).push(e); });
  const laterHTML = Object.keys(byDate).sort().map(ds =>
    `<div class="event-date-head">${fmtDate(ds)}</div>` +
    byDate[ds].sort((a,b) => (a.time||'') < (b.time||'') ? -1 : 1).map(eventItemHTML).join('')
  ).join('');
  document.getElementById('dash-events-later').innerHTML = laterHTML || `<div class="empty">${t('empty_events_later')}</div>`;
  document.getElementById('btn-later').style.display = laterEvents.length ? '' : 'none';
  document.getElementById('btn-later').textContent = showLater ? t('hide_later') : t('show_later');
  if (!laterEvents.length) { showLater = false; document.getElementById('dash-events-later').style.display = 'none'; }

  const upcoming = open.filter(t => t.due).sort((a,b) => ((a.due)+(a.time||'')) < ((b.due)+(b.time||'')) ? -1 : 1).slice(0, 5);
  document.getElementById('dash-tasks').innerHTML = upcoming.length
    ? upcoming.map(tk => taskHTML(tk, true)).join('')
    : `<div class="empty">${t('empty_due')}</div>`;

  const recentDone = tasks.filter(t => t.done).sort((a,b) => (b.doneAt||0) - (a.doneAt||0)).slice(0, 5);
  document.getElementById('dash-done').innerHTML = recentDone.length
    ? recentDone.map(tk => taskHTML(tk, true)).join('')
    : `<div class="empty">${t('empty_done')}</div>`;
}

// ---------- Notifications ----------
let notifEnabled = localStorage.getItem('planner_notif') === '1';
const notified = new Set();
function updateNotifBtn() {
  const btn = document.getElementById('btn-notif');
  if (!('Notification' in window)) { btn.style.display = 'none'; return; }
  if (Notification.permission === 'denied') { btn.textContent = t('notif_blocked'); btn.classList.remove('on'); return; }
  btn.textContent = notifEnabled && Notification.permission === 'granted' ? t('notif_on') : t('notif_off');
  btn.classList.toggle('on', notifEnabled && Notification.permission === 'granted');
}
function toggleNotif() {
  if (!('Notification' in window)) return;
  if (notifEnabled) {
    notifEnabled = false;
    localStorage.setItem('planner_notif', '0');
    updateNotifBtn();
    return;
  }
  Notification.requestPermission().then(perm => {
    if (perm === 'granted') {
      notifEnabled = true;
      localStorage.setItem('planner_notif', '1');
    }
    updateNotifBtn();
  });
}
let notifyOffsets = store.load('notifyOffsets', [0]);
const OFFSET_OPTS = [0, 5, 15, 30, 60, 1440];
function renderOffsetChips() {
  const el = document.getElementById('notif-offsets');
  if (!el) return;
  el.innerHTML = `<span class="settings-label">${t('notify_when')}</span>` +
    OFFSET_OPTS.map(o => `<button class="chip-btn ${notifyOffsets.includes(o) ? 'on' : ''}" onclick="toggleOffset(${o})">${t('off_' + o)}</button>`).join('');
}
function toggleOffset(o) {
  notifyOffsets = notifyOffsets.includes(o) ? notifyOffsets.filter(x => x !== o) : [...notifyOffsets, o];
  store.saveRaw('notifyOffsets', notifyOffsets);
  renderOffsetChips();
}
function fireNotif(icon, title, body, key) {
  if (notified.has(key)) return;
  notified.add(key);
  beep();
  new Notification(icon + ' ' + title, { body });
}
function checkReminders() {
  if (!notifEnabled || !('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  now.setSeconds(0, 0);
  const nowMs = now.getTime();
  const today = todayStr();
  const hm = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  [today, dateToStr(new Date(Date.now() + 86400000))].forEach(ds => {
    const targetMs = tm => { const [H, M] = tm.split(':').map(Number); const d = strToDate(ds); d.setHours(H, M, 0, 0); return d.getTime(); };
    const check = (item, icon, keyPrefix) => {
      if (item.notify === false) return;
      if (item.notifyAt) {
        if (ds === today && targetMs(item.notifyAt) === nowMs)
          fireNotif(icon, item.title, (timeStr(item) ? timeStr(item) + ' · ' : '') + fmtDate(ds), keyPrefix + item.id + ds + 'na');
      } else if (item.time) {
        notifyOffsets.forEach(off => {
          if (targetMs(item.time) - off * 60000 === nowMs)
            fireNotif(icon, item.title, (off ? t('off_' + off) + ' · ' : '') + fmtDate(ds) + ' ' + timeStr(item), keyPrefix + item.id + ds + off);
        });
      }
    };
    eventsOn(ds).forEach(e => check(e, '📅', 'e'));
    tasks.filter(tk => !tk.done && tk.due === ds).forEach(tk => check(tk, '📌', 't'));
  });

  habits.filter(h => h.remind === hm && !h.dates.includes(today)).forEach(h => {
    fireNotif('🔥', h.name, t('habit_notif_body'), 'h' + h.id + today);
  });
}
setInterval(checkReminders, 20000);

// ---------- Init ----------
function renderAll() {
  renderTasks(); renderCal(); renderProj(); renderHabits(); renderDiary(); renderDash(); renderStats();
}
document.getElementById('diary-date').value = todayStr();
document.getElementById('pomo-work-min').value = pomoCfg.work;
document.getElementById('pomo-break-min').value = pomoCfg.brk;
applyTheme();
pomoRestore();
renderColorSwatches();
applyI18n();
renderMoodPicker();
renderAll();
initFirebase();
</script>
